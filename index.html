<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación · Mis 15</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@600;700&family=Oswald:wght@300;400;500;600&display=swap');

  :root{
    --azul:#1400d4;
    --azul-claro:#3a25f5;
    --azul-brillo:#5c4aff;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:#0a0a0a;
    font-family:'Oswald',sans-serif;
    overflow-x:hidden;
  }

  #stage{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    position:relative;padding:24px;
  }
  #stage::before{
    content:"";position:fixed;inset:0;
    background:
      radial-gradient(circle at 20% 20%,rgba(20,0,212,0.12),transparent 40%),
      radial-gradient(circle at 80% 80%,rgba(20,0,212,0.08),transparent 40%);
    pointer-events:none;
  }

  .hint{
    position:absolute;bottom:8%;left:50%;
    transform:translateX(-50%);
    color:#3a25f5;font-size:13px;letter-spacing:3px;
    text-transform:uppercase;white-space:nowrap;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.9}}

  /* ---- SOBRE ---- */
  .envelope-wrap{
    width:min(86vw,360px);aspect-ratio:3/2;
    position:relative;cursor:pointer;perspective:1400px;
  }

  .envelope-base{
    position:absolute;inset:0;
    background:linear-gradient(135deg,#111,#0a0a0a);
    border:1px solid var(--azul);
    box-shadow:0 30px 60px rgba(0,0,0,.8),0 0 20px rgba(20,0,212,.2) inset;
    overflow:hidden;
  }
  .envelope-base::before{
    content:"";position:absolute;bottom:0;left:0;
    width:0;height:0;border-style:solid;
    border-width:0 0 50% 50%;
    border-color:transparent transparent #0d0010 transparent;
  }
  .envelope-base::after{
    content:"";position:absolute;bottom:0;right:0;
    width:0;height:0;border-style:solid;
    border-width:0 50% 50% 0;
    border-color:transparent transparent #0d0010 transparent;
  }

  .stamp{
    position:absolute;top:14px;right:14px;
    width:46px;height:56px;
    border:2px dashed var(--azul);
    display:flex;align-items:center;justify-content:center;
    color:var(--azul-claro);font-family:'Anton',sans-serif;font-size:20px;
    background:rgba(20,0,212,.08);
  }

  .to-line{
    position:absolute;bottom:22%;left:12%;
    font-family:'Caveat',cursive;font-size:22px;
    color:#ddd;
  }
  .to-line span{
    display:block;font-family:'Oswald',sans-serif;
    font-size:10px;letter-spacing:2px;
    color:var(--azul-claro);text-transform:uppercase;margin-bottom:2px;
  }

  .card-peek{
    position:absolute;left:6%;right:6%;top:8%;height:84%;
    background:linear-gradient(160deg,#0d00a0,#08006a);
    border-radius:2px;z-index:2;
    transform:translateY(0%);
    transition:transform 1.1s cubic-bezier(.18,.89,.32,1.16) .55s;
    box-shadow:0 10px 30px rgba(0,0,0,.7);
    display:flex;align-items:flex-start;justify-content:center;overflow:hidden;
  }
  .card-peek .num{
    margin-top:10%;
    font-family:'Anton',sans-serif;
    color:#fff;font-size:15vw;line-height:1;
    -webkit-text-stroke:1px var(--azul-brillo);
    text-shadow:0 0 30px rgba(92,74,255,.6);
  }

  .flap{
    position:absolute;top:0;left:0;right:0;height:52%;
    background:linear-gradient(135deg,#111,#0a0a0a);
    border-bottom:1px solid var(--azul);
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top center;
    transition:transform 1s cubic-bezier(.65,0,.35,1);
    z-index:4;box-shadow:0 2px 10px rgba(20,0,212,.3);
  }

  .seal{
    position:absolute;top:42%;left:50%;
    width:56px;height:56px;
    background:radial-gradient(circle at 35% 30%,var(--azul-claro),var(--azul) 70%);
    border-radius:50%;
    transform:translate(-50%,-50%);
    z-index:5;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,.7),0 0 0 2px var(--azul-brillo),0 0 16px rgba(20,0,212,.5);
    transition:opacity .4s ease,transform .4s ease;
  }
  .seal svg{width:28px;height:28px;fill:#fff;}

  .envelope-wrap.open .flap{transform:rotateX(180deg);}
  .envelope-wrap.open .seal{opacity:0;transform:translate(-50%,-50%) scale(.4);}
  .envelope-wrap.open .card-peek{
    transform:translateY(-145%);
    transition:transform 1.1s cubic-bezier(.22,.8,.3,1.2) .35s;
  }

  /* ---- INVITACIÓN ---- */
  #invitation{
    position:fixed;inset:0;
    background:#080808;
    opacity:0;visibility:hidden;
    overflow-y:auto;
    transition:opacity .9s ease;
    z-index:10;
  }
  #invitation.show{opacity:1;visibility:visible;}

  .card{
    max-width:480px;margin:0 auto;
    min-height:100vh;
    padding:48px 32px 70px;
    text-align:center;
    background:radial-gradient(ellipse at top,rgba(20,0,212,.12),transparent 55%);
  }

  .crown{width:64px;margin:4px auto 18px;display:block;}

  .eyebrow{
    font-size:13px;letter-spacing:6px;
    font-weight:500;color:#666;text-transform:uppercase;
  }

  .quince{
    font-family:'Anton',sans-serif;
    font-size:clamp(120px,38vw,210px);
    line-height:.8;
    color:#fff;
    margin:18px 0 6px;letter-spacing:-2px;
    position:relative;
    text-shadow:0 0 60px rgba(20,0,212,.8),0 0 20px rgba(92,74,255,.4);
  }
  .quince::after{
    content:"";position:absolute;
    left:50%;bottom:-6px;
    transform:translateX(-50%) rotate(-1.5deg);
    width:78%;height:12px;
    background:linear-gradient(90deg,transparent,var(--azul),var(--azul-claro),var(--azul),transparent);
  }

  .ribbon{
    display:inline-block;
    background:linear-gradient(135deg,var(--azul),var(--azul-claro));
    color:#fff;
    padding:10px 22px;margin-top:26px;
    font-family:'Caveat',cursive;font-weight:700;
    font-size:26px;letter-spacing:1px;transform:rotate(-1deg);
    box-shadow:0 4px 16px rgba(20,0,212,.5);
  }

  .details{
    margin-top:42px;text-align:left;
    display:inline-flex;flex-direction:column;gap:18px;
  }
  .detail-row{
    display:flex;align-items:center;gap:14px;
    font-size:16px;font-weight:500;letter-spacing:.5px;
    color:#ccc;
  }
  .detail-row svg{width:20px;height:20px;flex-shrink:0;}

  .divider{
    width:60%;height:1px;
    background:linear-gradient(90deg,transparent,var(--azul-claro),transparent);
    margin:34px auto;
  }

  .no-faltes{
    font-family:'Caveat',cursive;font-weight:700;
    font-size:38px;color:#fff;
    text-shadow:0 0 20px rgba(20,0,212,.8);
  }

  /* nombre del invitado al final */
  .guest-block{
    margin-top:40px;
    padding:26px 18px 30px;
    background:linear-gradient(135deg,var(--azul),#0d00a0);
    box-shadow:0 8px 30px rgba(20,0,212,.5);
    transform:rotate(.4deg);
  }
  .guest-block .label{
    font-size:13px;letter-spacing:4px;
    font-weight:500;text-transform:uppercase;
    color:rgba(255,255,255,.6);
  }
  .guest-block .nombre{
    font-family:'Caveat',cursive;font-weight:700;
    font-size:52px;margin:4px 0;color:#fff;
    line-height:1.1;
  }
  .guest-block .sub{
    font-size:12px;letter-spacing:2px;
    text-transform:uppercase;color:rgba(255,255,255,.6);
  }

  .footer-note{
    margin-top:40px;font-size:11px;
    letter-spacing:2px;color:#555;text-transform:uppercase;
  }

  @media(prefers-reduced-motion:reduce){
    .flap,.card-peek,.seal,#invitation{transition:none!important;}
  }
</style>
</head>
<body>

<div id="stage">
  <div class="envelope-wrap" id="envelope">
    <div class="card-peek"><div class="num">15</div></div>
    <div class="envelope-base">
      <div class="stamp">XV</div>
      <div class="to-line"><span>Para</span><span id="guestName">Vos</span> ♥</div>
    </div>
    <div class="flap"></div>
    <div class="seal">
      <svg viewBox="0 0 24 24"><path d="M12 2L9 8l-6 1 4.5 4.4L6.4 20 12 17l5.6 3-1.1-6.6L21 9l-6-1z"/></svg>
    </div>
  </div>
  <div class="hint">Toca el sobre para abrirlo</div>
</div>

<div id="invitation">
  <div class="card">
    <svg class="crown" viewBox="0 0 100 60" fill="none" stroke-width="4" stroke-linejoin="round">
      <defs>
        <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#5c4aff"/>
          <stop offset="100%" stop-color="#1400d4"/>
        </linearGradient>
      </defs>
      <path d="M10 50 L15 20 L32 38 L50 12 L68 38 L85 20 L90 50 Z" stroke="url(#cg)"/>
    </svg>

    <div class="eyebrow">Estás invitado a mis</div>
    <div class="quince">15</div>
    <div class="ribbon">Una noche para recordarr</div>

    <div class="details">
      <div class="detail-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="#5c4aff" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        28 / 07
      </div>
      <div class="detail-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="#5c4aff" stroke-width="2"><path d="M12 21s7-7.5 7-12a7 7 0 1 0-14 0c0 4.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.3"/></svg>
        Conde del Maule 4470
      </div>
      <div class="detail-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="#5c4aff" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        A partir de las 20:00 hs
      </div>
    </div>

    <div class="divider"></div>
    <div class="no-faltes">¡No faltes!</div>

    <div class="guest-block">
      <div class="label">Para</div>
      <div class="nombre" id="guestNameCard">Vos</div>
      <div class="sub">Con cariño, te espero </div>
    </div>

    <div class="footer-note">Una noche para recordar · 28/07</div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const nombre = params.get('nombre');
  if (nombre) {
    const decoded = decodeURIComponent(nombre);
    document.getElementById('guestName').textContent = decoded;
    document.getElementById('guestNameCard').textContent = decoded;
  }

  const envelope = document.getElementById('envelope');
  const invitation = document.getElementById('invitation');

  function openInvite(){
    envelope.classList.add('open');
    setTimeout(()=>{
      invitation.classList.add('show');
      document.body.style.overflow = 'auto';
    }, 1400);
    envelope.style.pointerEvents = 'none';
  }

  envelope.addEventListener('click', openInvite);
</script>
</body>
</html>
